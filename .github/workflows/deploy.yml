name: Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  PROJECT_ID: jpa-live-portal
  REGION: asia-northeast1
  SERVICE: jpa-ai-backend
  IMAGE: asia-northeast1-docker.pkg.dev/jpa-live-portal/jpa-ai-backend/app

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker asia-northeast1-docker.pkg.dev --quiet

      - name: Create Artifact Registry repository (if not exists)
        run: |
          gcloud artifacts repositories describe jpa-ai-backend \
            --location=asia-northeast1 --project=$PROJECT_ID 2>/dev/null || \
          gcloud artifacts repositories create jpa-ai-backend \
            --repository-format=docker \
            --location=asia-northeast1 \
            --project=$PROJECT_ID

      - name: Build and push Docker image
        run: |
          docker build -t $IMAGE:$GITHUB_SHA -t $IMAGE:latest .
          docker push $IMAGE:$GITHUB_SHA
          docker push $IMAGE:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE \
            --image=$IMAGE:$GITHUB_SHA \
            --region=$REGION \
            --project=$PROJECT_ID \
            --platform=managed \
            --allow-unauthenticated \
            --set-env-vars="LINE_CHANNEL_SECRET=${{ secrets.LINE_CHANNEL_SECRET }},LINE_CHANNEL_ACCESS_TOKEN=${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }},FIREBASE_PROJECT_ID=jpa-live-portal" \
            --min-instances=0 \
            --max-instances=3 \
            --memory=512Mi \
            --port=8080

      - name: Show service URL
        run: |
          gcloud run services describe $SERVICE \
            --region=$REGION \
            --project=$PROJECT_ID \
            --format='value(status.url)'
